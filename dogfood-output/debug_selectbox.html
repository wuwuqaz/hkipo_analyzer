:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-tertiary: #1a2332;
  --bg-card: rgba(17, 24, 39, 0.75);
  --bg-card-hover: rgba(26, 35, 50, 0.85);
  --bg-glass: rgba(255, 255, 255, 0.03);
  --bg-glass-hover: rgba(255, 255, 255, 0.06);

  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-tertiary: #64748b;
  --text-emphasis: #ffffff;

  --accent-cyan: #06b6d4;
  --accent-cyan-light: #22d3ee;
  --accent-cyan-dark: #0891b2;
  --accent-amber: #f59e0b;
  --accent-amber-light: #fbbf24;
  --accent-emerald: #10b981;
  --accent-emerald-light: #34d399;
  --accent-rose: #f43f5e;
  --accent-rose-light: #fb7185;
  --accent-blue: #3b82f6;
  --accent-violet: #8b5cf6;

  --score-excellent: #34d399;
  --score-good: #a3e635;
  --score-medium: #fbbf24;
  --score-poor: #fb7185;

  --border-subtle: rgba(148, 163, 184, 0.1);
  --border-glow: rgba(6, 182, 212, 0.3);
  --border-glow-strong: rgba(6, 182, 212, 0.5);

  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
  --shadow-glow: 0 0 20px rgba(6, 182, 212, 0.15);
  --shadow-glow-strong: 0 0 30px rgba(6, 182, 212, 0.25);

  --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Unbounded', sans-serif;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
  --transition-slow: 0.4s ease;
}

/* ===== Base ===== */
.stApp {
  background: var(--bg-primary);
  font-family: var(--font-sans);
  color: var(--text-primary);
}

.stApp > header,
header[data-testid="stHeader"],
.stAppHeader {
  display: none !important;
  height: 0 !important;
}

}

div[data-testid="stHeader"],
div[data-testid="stToolbar"],
div[data-testid="stDecoration"],
div[data-testid="stStatusWidget"] {
  display: none !important;
  height: 0 !important;
}

.stApp div[data-testid="stAppViewContainer"] > .main,
.stApp section.main,
.stApp .main {
  padding-top: 0 !important;
}

.stApp .block-container,
.stApp div[data-testid="stVerticalBlock"] {
  padding-top: 0.75rem !important;
}

.stApp a {
  color: var(--accent-cyan);
  text-decoration: none;
  transition: color var(--transition-fast);
}

.stApp a:hover {
  color: var(--accent-cyan-light);
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-sans);
  font-weight: 600;
}

/* ===== Sidebar ===== */
section[data-testid="stSidebar"] {
  background: linear-gradient(180deg, #080c14 0%, #0d1520 50%, #0a0e17 100%);
  border-right: 1px solid var(--border-subtle);
}

section[data-testid="stSidebar"] p,
section[data-testid="stSidebar"] span,
section[data-testid="stSidebar"] div[data-baseweb="select"] > label,
section[data-testid="stSidebar"] button[kind="secondary"] {
  color: var(--text-secondary);
}

section[data-testid="stSidebar"] .stRadio > label {
  background: var(--bg-glass);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  margin-bottom: 4px;
  border: 1px solid transparent;
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}

section[data-testid="stSidebar"] .stRadio > label::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;

  transform: scaleY(0);
  transition: transform var(--transition-normal);

section[data-testid="stSidebar"] .stRadio > label:hover {

}

  gap: 2px;
}

/* ===== Glass Card System ===== */
.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-lg);
  padding: 18px 22px;
  margin-bottom: 12px;
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card);
  transition: all var(--transition-normal);
}

.glass-card:hover {
  border-color: rgba(148, 163, 184, 0.15);
  box-shadow: var(--shadow-card), 0 0 0 1px rgba(6, 182, 212, 0.05);
}

.glass-card-glow {
  border-color: var(--border-glow);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

.glass-card-glow:hover {
  border-color: var(--border-glow-strong);
  box-shadow: var(--shadow-card), var(--shadow-glow-strong);
}

.section-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-lg);
  padding: 18px 22px;
  margin-bottom: 12px;
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-card);
  transition: all var(--transition-normal);
}

.section-title {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 12px;
  border-left: 3px solid var(--accent-cyan);
}

/* ===== Metric Cards ===== */
.metric-card {
  background: linear-gradient(135deg, rgba(17, 24, 39, 0.8) 0%, rgba(26, 35, 50, 0.6) 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  border: 1px solid var(--border-subtle);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
  text-align: center;
  transition: all var(--transition-normal);
}

.metric-card:hover {
  transform: translateY(-2px);
  border-color: rgba(148, 163, 184, 0.2);
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
}

.metric-card .label {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.metric-card .value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}

.metric-card .sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

/* Score colors on dark */
.score-excellent .value {
  color: var(--score-excellent);
  text-shadow: 0 0 12px rgba(52, 211, 153, 0.3);
}

.score-good .value {
  color: var(--score-good);
  text-shadow: 0 0 12px rgba(163, 230, 53, 0.25);
}

.score-medium .value {
  color: var(--score-medium);
  text-shadow: 0 0 12px rgba(251, 191, 36, 0.25);
}

.score-poor .value {
  color: var(--score-poor);
  text-shadow: 0 0 12px rgba(251, 113, 133, 0.25);
}

/* ===== KPI Grid ===== */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.kpi-item {
  background: var(--bg-glass);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  border: 1px solid var(--border-subtle);
  transition: background var(--transition-fast);
}

.kpi-item:hover {
  background: var(--bg-glass-hover);
}

.kpi-item .kpi-label {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.kpi-item .kpi-value {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-top: 3px;
}

/* ===== Tags ===== */
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
}

.tag-green {
  background: rgba(52, 211, 153, 0.15);
  color: var(--score-excellent);
  border: 1px solid rgba(52, 211, 153, 0.25);
}

.tag-yellow {
  background: rgba(251, 191, 36, 0.15);
  color: var(--score-medium);
  border: 1px solid rgba(251, 191, 36, 0.25);
}

.tag-red {
  background: rgba(251, 113, 133, 0.15);
  color: var(--score-poor);
  border: 1px solid rgba(251, 113, 133, 0.25);
}

.tag-blue {
  background: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
  border: 1px solid rgba(59, 130, 246, 0.25);
}

.tag-gray {
