version: "3.8"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hkipo-fastapi
    environment:
      - HKIPO_API_TOKEN=${HKIPO_API_TOKEN:?HKIPO_API_TOKEN is required}
      - STORAGE_BASE_PATH=/app/storage
      - MAX_CONCURRENT_ANALYSES=2
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - fastapi-storage:/app/storage
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: hkipo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
      - nextjs
    restart: unless-stopped
    profiles:
      - default

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hkipo-nextjs
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://fastapi:8000/api
      - NEXT_PUBLIC_API_URL=/api
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Streamlit admin - transition profile
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: hkipo-streamlit
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - fastapi-storage:/app/storage
    restart: unless-stopped
    profiles:
      - transition

volumes:
  fastapi-storage:
