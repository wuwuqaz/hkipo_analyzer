services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hkipo-fastapi
    environment:
      - STORAGE_BASE_PATH=/app/storage
      - MAX_CONCURRENT_ANALYSES=2
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - HKIPO_REQUIRE_API_TOKEN=${HKIPO_REQUIRE_API_TOKEN:-false}
      - HKIPO_API_TOKEN=${HKIPO_API_TOKEN:-}
    volumes:
      - fastapi-storage:/app/storage
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: hkipo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/tmp/nginx.default.conf:ro
      - ./nginx.full.conf:/tmp/nginx.full.conf:ro
    environment:
      - NGINX_TEMPLATE=${NGINX_TEMPLATE:-default}
    command: >
      sh -c "cp /tmp/nginx.$${NGINX_TEMPLATE}.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - fastapi
    restart: unless-stopped

  # Optional until the frontend image is validated in a Docker-enabled environment.
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hkipo-nextjs
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://fastapi:8000/api
      - INTERNAL_API_TOKEN=${HKIPO_API_TOKEN:-}
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_API_TOKEN=${HKIPO_API_TOKEN:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  fastapi-storage:
